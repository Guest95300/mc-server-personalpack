#StoryChat Mod Configuration
[general]
	#Chat display mode. Options: story, vanilla
	chatMode = "story"
	#Chat layout position. Options: bottom_center, bottom_left, bottom_right, top_left, top_right
	chatPosition = "bottom_center"
	#Chat background plate theme. Options: custom_color
	chatTheme = "custom_color"
	#Enable smooth animations for the settings menu GUI
	guiAnimation = true
	#Enable smooth pop-up animations for incoming chat messages
	chatAnimation = true
	#Enable slide-in animation for the chat history viewer
	historyAnimation = true
	#Enable text-printing typewriter effect for messages
	typewriterEffect = true
	#Speed modifier for GUI animations (0.75 = slow, 1.0 = medium, 1.5 = fast)
	# Default: 1.5
	# Range: 0.1 ~ 5.0
	animationSpeed = 1.5
	#Who sees custom nickname colors. Options: off, only_me, everyone
	nickColorMode = "only_me"
	#Default fallback nickname HEX color (6 characters, NO # symbol)
	defaultNickColor = "FFFFFF"
	#Custom theme background HEX color (6 characters, NO # symbol)
	themeColor = "000000"
	#How long messages stay visible on screen (in seconds)
	# Default: 3
	# Range: 1 ~ 9999
	chatDuration = 3
	#Sync UI scale with vanilla Minecraft settings
	bindScale = true
	#Custom chat UI scale level (1-4)
	# Default: 3
	# Range: 1 ~ 4
	chatScale = 3
